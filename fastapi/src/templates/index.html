<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Diploi - SEO Preview Checker</title>
  <meta name="description" content="Test commom SEO variables in your website.">
  <link rel="icon" href="https://raw.githubusercontent.com/diploi/media/refs/heads/main/logos/diploi/svg/diploi-logo-icon-dark.svg" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-xl bg-white rounded-2xl shadow p-6 space-y-6">
    <header class="space-y-2">
      <h1 class="text-2xl font-semibold text-slate-800">SEO Preview Checker</h1>
      <p class="text-sm text-slate-500">
        Paste any public URL. We'll grab the title, meta description, OG tags, etc.
      </p>
    </header>

    <form method="post" action="/analyze-form" class="space-y-4">
      <div>
        <label for="url" class="block text-sm font-medium text-slate-700 mb-1">
          URL
        </label>
        <input
          id="url"
          name="url"
          type="url"
          required
          placeholder="https://example.com"
          class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm outline-none focus:border-slate-500 focus:ring-2 focus:ring-slate-200"
        />
      </div>

      <button
        type="submit"
        class="w-full rounded-xl bg-slate-900 text-white text-sm font-medium py-2.5 hover:bg-slate-800 active:bg-slate-700 transition"
      >
        Analyze
      </button>
    </form>

    <footer class="text-center text-[11px] text-slate-400">
      Built on <a style="color: darkblue; font-weight: bold;" href="https://diploi.com">Diploi</a> with FastAPI • instant preview of SEO meta / OG tags
    </footer>
  </div>
</body>
</html>
